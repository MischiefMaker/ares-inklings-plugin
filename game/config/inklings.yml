inklings:
  shortcuts: {}
  # Job category used for jobs Inklings creates to notify staff of
  # player activity (new threads, replies, deletions). Create this
  # category in-game with: job/createcategory INKLINGS
  # and set access roles with: job/categoryroles INKLINGS=<roles>
  job_category: INKLINGS

  # Inkling types (kinds). Add, remove, or edit entries here to
  # customize the game's inkling types - no code changes needed. The
  # key (e.g. "hint") is the internal value stored on the Inkling
  # record and used in commands like +inkling/hint. Run
  # +inkling/types in-game to see the current live listing.
  #
  # Each entry supports:
  #   category    - "staff" (only staff can start one, always aimed at
  #                 a specific player), "player" (a player starts one
  #                 about themselves), or "shared" (either party can
  #                 start it - "secret" is the only shared type by
  #                 default, since staff can create one on a player's
  #                 behalf too).
  #   name        - Display label shown in listings, thread headers,
  #                 and the web portal's type picker.
  #   description - Short description shown in +inkling/types and
  #                 pulled into the help files.
  #   chargen     - Optional, defaults to false. If true, unapproved
  #                 characters can create this type during character
  #                 creation (used by goal/secret today, for the
  #                 chargen hook that prompts for both).
  #
  # Note: rolls are NOT a type - they're a different kind of record
  # that can be attached to any inkling thread, and work differently
  # enough (FS3/NPC/static, reroll-with-luck, etc.) that they aren't
  # configurable here.
  types:
    hint:
      category: staff
      name: Hint
      description: A hint or guidance from staff about something.
    vision:
      category: staff
      name: Vision
      description: An in-character vision or supernatural experience.
    nudge:
      category: staff
      name: Nudge
      description: A gentle nudge from staff to encourage RP in a certain direction.
    hook:
      category: staff
      name: Hook
      description: A plot hook or opportunity from staff.
    initiative:
      category: player
      name: Initiative
      description: Something your character is actively doing that requires staff feedback - an action they're taking, something they're researching, or anything they're pursuing that touches the wider game world.
    request:
      category: player
      name: Request
      description: A request for staff assistance or plot.
    pitch:
      category: player
      name: Pitch
      description: A pitch for a scene, plot arc, or event you'd like to happen.
    goal:
      category: player
      name: Goal
      description: A long-term goal your character is working toward.
      chargen: true
    secret:
      category: shared
      name: Secret
      description: An IC secret your character holds, shareable with other players.
      chargen: true

  # Bonus XP awarded periodically to characters who have submitted an
  # inkling of the configured type since the last award cycle ran. See
  # InklingXpCronHandler (plugin/events/) and
  # Inklings.run_xp_award_cycle (plugin/inklings.rb) for the
  # implementation. Requires the FS3Skills plugin to be installed and
  # loaded - if it isn't, the cron job silently does nothing.
  #
  #   inkling_type_xp - the inkling type that qualifies for the bonus.
  #     ***NOTE***: "update" (this setting's literal default) is NOT a
  #     creatable inkling type in this plugin - it was deliberately
  #     removed as a type (see the comment above PLAYER_KINDS-era
  #     history in inklings.rb) because "+inkling/update <id>=<text>"
  #     reads as "update thread #<id>", not "create a new update-type
  #     thread". Left at this literal default, the reward can only
  #     ever match legacy data from before that change - it will never
  #     match a newly-created inkling, since nothing can create one of
  #     kind "update" anymore. To actually use this feature, either:
  #       (a) point inkling_type_xp at a real type from the "types"
  #           section above (e.g. "goal" or "initiative"), or
  #       (b) add an "update" entry back into "types" above if you
  #           want a dedicated type just for this reward.
  #   xp_amount - how much bonus XP to award each qualifying character
  #     per award period (default: 1).
  #   award_cron - controls how often the award cycle runs. Standard
  #     Ares cron config format - see
  #     https://www.aresmush.com/tutorials/code/cron.html
  #     Default below runs weekly, Saturday at 9pm. Set to {} to
  #     disable the award cycle entirely without removing the other
  #     settings.
  inkling_type_xp: update
  xp_amount: 1
  award_cron:
    day_of_week:
      - Sat
    hour:
      - 21
    minute:
      - 0
