inklings:
  shortcuts: {}
  # Permission required to manage inklings (start staff threads, GM notes,
  # view/approve/reward any thread). Defaults to "manage_apps" which is the
  # standard AresMUSH permission for character application/chargen management.
  # Change this to a different permission name if your game's staff structure
  # differs. The permission must exist in your game's role configuration.
  manage_permission: manage_apps

  # Job category used for jobs Inklings creates to notify staff of
  # player activity (new threads, replies, deletions). Create this
  # category in-game with: job/createcategory Plots
  # and set access roles with: job/categoryroles Plots=<roles>
  job_category: Plots

  # Turns the chargen-inkling integration on or off. The chargen feature is
  # fixed to two types - secret and goal - which players fill in on the
  # "Secret & Goal" chargen tab (and can edit on their profile). Set this to
  # false to disable it entirely: no chargen tab data, no approval
  # requirement, nothing converted on approval. Defaults to true if omitted.
  chargen_enabled: true

  # If chargen is enabled, whether the Secret and Goal drafts are REQUIRED
  # for character approval. When true (default), app review will throw a
  # RED (blocking) warning if either is missing. When false, it throws a
  # YELLOW (advisory) warning instead. Only has effect if chargen_enabled
  # is true; ignored when chargen is disabled.
  chargen_required: true

  # Inkling types (kinds). Add, remove, or edit entries here to
  # customize the game's inkling types - no code changes needed. The
  # key (e.g. "hint") is the internal value stored on the Inkling
  # record and used in commands like +inkling/hint. Run
  # +inkling/types in-game to see the current live listing.
  #
  # Each entry supports:
  #   category    - "staff" (only staff can start one, always aimed at
  #                 a specific player), "player" (a player starts one
  #                 about themselves), or "shared" (either party can
  #                 start it - "secret" is the only shared type by
  #                 default, since staff can create one on a player's
  #                 behalf too).
  #   name        - Display label shown in listings, thread headers,
  #                 and the web portal's type picker.
  #   description - Short description shown in +inkling/types and
  #                 pulled into the help files.
  #   chargen     - Optional, defaults to false. If true, unapproved
  #                 characters can use +inkling/<kind> to create a REAL
  #                 Inkling of this type immediately, bypassing the normal
  #                 approval requirement. NOT used by goal/secret - those
  #                 are handled by the separate chargen-draft mechanism
  #                 (chargen_enabled in this file's top section), which
  #                 saves draft text and only creates the real Inkling on
  #                 approval. Leave this unset for any custom type unless
  #                 you specifically want unapproved characters creating
  #                 permanent records right away.
  #   color       - Optional color for the type badge in the web portal
  #                 (hex code or Bootstrap color name: primary, success,
  #                 danger, warning, info, secondary, dark, light).
  #                 Defaults to neutral gray if omitted.
  #
  # Note: rolls are NOT a type - they're a different kind of record
  # that can be attached to any inkling thread, and work differently
  # enough (FS3/NPC/static rolls, private vs. visible, etc.) that they
  # aren't configurable here.
  types:
    hint:
      category: staff
      name: Hint
      description: A hint or guidance from staff about something.
      color: danger
    vision:
      category: staff
      name: Vision
      description: An in-character vision or supernatural experience.
      color: danger
    nudge:
      category: staff
      name: Nudge
      description: A gentle nudge from staff to encourage RP in a certain direction.
      color: danger
    hook:
      category: staff
      name: Hook
      description: A plot hook or opportunity from staff.
      color: danger
    initiative:
      category: player
      name: Initiative
      description: Something your character is actively doing that requires staff feedback - an action they're taking, something they're researching, or anything they're pursuing that touches the wider game world.
      color: success
    request:
      category: player
      name: Request
      description: A request for staff assistance or plot.
      color: success
    pitch:
      category: player
      name: Pitch
      description: A pitch for a scene, plot arc, or event you'd like to happen.
      color: success
    goal:
      category: player
      name: Goal
      description: A long-term goal your character is working toward.
      color: success
    secret:
      category: shared
      name: Secret
      description: An IC secret your character holds, shareable with other players.
      color: info
    progress:
      category: player
      name: Progress
      description: A personal record of your character's development, important events, growth, discoveries, relationships, and ongoing history. Use this to maintain a chronicle of significant moments and changes.
      color: info

  # Optional periodic XP awards for characters who have submitted an
  # inkling of the configured type since the last award cycle ran.
  # Requires the FS3Skills plugin to be installed and loaded - if it
  # isn't, the cron job silently does nothing. Set inkling_xp_cron to
  # {} to disable this feature entirely.
  #
  #   inkling_xp_type - the inkling type that qualifies for the bonus.
  #     This is an optional reward: each cron cycle, characters who
  #     submitted an inkling of this type get the XP bonus. Leave this
  #     at "progress" or change to any real type from the "types" section
  #     above (e.g. "goal" or "initiative").
  #     ***NOTE***: "update" is NOT a creatable inkling type in this
  #     plugin (it was deliberately removed) - do not use "update" here.
  #   inkling_xp_amount - how much bonus XP to award each qualifying
  #     character per award period (default: 1).
  #   inkling_xp_cron - controls how often the award cycle runs. Standard
  #     Ares cron config format - see
  #     https://www.aresmush.com/tutorials/code/cron.html
  #     Default below runs weekly, Saturday at 9pm. Set to {} to
  #     disable the award cycle entirely without removing the other
  #     settings.
  inkling_xp_type: progress
  inkling_xp_amount: 1
  inkling_xp_cron:
    day_of_week:
      - Sat
    hour:
      - 21
    minute:
      - 0
