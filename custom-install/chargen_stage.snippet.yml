# CHARGEN STAGE SNIPPET - SECRETS & GOALS STAGE
#
# FILE: game/config/chargen.yml (in your game folder, NOT the plugin folder)
#
# PURPOSE:
# Adds an optional "Secrets & Goals" information stage to your chargen process.
# Players can fill in their character's Secret and Goal during character creation
# using the MUSH commands, which saves them as drafts and converts them to real
# Inklings when the character is approved.
#
# ===========================================================================
# INSTALLATION STEPS
# ===========================================================================
#
# STEP 1: Open game/config/chargen.yml in your game folder
#
# STEP 2: Find the "stages:" section. It looks like:
#
#         stages:
#           sheet:
#             help: sheets
#           demographics:
#             help: demographics
#           ...
#           review:
#             title: App Submission
#             text: ...
#
# STEP 3: Add this new stage BEFORE the "review" stage:

secrets_goals:
  title: Secrets & Goals
  help: inklings
  text: During character creation, you can optionally set your character's secret
    and long-term goal using the commands below. These are saved as drafts and become
    real Inklings when your character is approved.%R%RUse these MUSH commands to fill
    them in:%R%xc+inkling/secret <title>/<description>%xn%R%xc+inkling/goal <title>/<description>%xn%R%RYou can edit these later from your profile or using +inkling/secret and +inkling/goal
    commands. Both are optional.

# STEP 4: Log in to your server and run `sudo reboot` to restart it.
